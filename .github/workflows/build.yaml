name: Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-dispatch:
    uses: zavestudios/platform-pipelines/.github/workflows/container-build-dispatch.yml@c0aa80bb405fa24ede5ebcf1c40b0be90328386c
    with:
      image_name: zavestudios/oracle
      dockerfile: Dockerfile
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      platforms: linux/amd64,linux/arm64
      dispatch_repository: zavestudios/gitops
      dispatch_event_type: oracle-image-published
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITOPS_REPO_DISPATCH_TOKEN: ${{ secrets.GITOPS_REPO_DISPATCH_TOKEN }}
