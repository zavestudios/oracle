name: Build and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    uses: zavestudios/platform-pipelines/.github/workflows/container-build.yml@main
    with:
      image_name: zavestudios/oracle
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
